# Table leg removal experiment configuration
# Inherits from default.yaml and overrides specific settings

dataset:
  category: "Table"
  semantic_label: "leg"
  total_samples: 50
  random_seed: 42

repair:
  margin: 0.05
  proximity_threshold: 0.1
  methods:
    - "center_fan"
    - "planar_removed_part_aware"
    - "mlp_patch_rpa"
    - "planar_largest_hole_only"

mlp_patch:
  hidden_sizes: [64, 32, 16]
  random_state: 42
  model_path: "outputs/models/mlp_patch_generator_table.pkl"

experiment:
  name: "table_leg_removal"
  description: "Minimal-change local mesh repair after table leg removal"

paths:
  raw_data_dir: "D:/MyJupyter/Works/3DPART_v2/data/raw/table_leg_removal"