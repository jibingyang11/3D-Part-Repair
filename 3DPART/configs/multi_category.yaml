# Multi-category experiment configuration
# Extends the benchmark to Table and StorageFurniture categories

dataset:
  categories:
    - category: "Chair"
      semantic_label: "leg"
      total_samples: 100
    - category: "Table"
      semantic_label: "leg"
      total_samples: 50
    - category: "StorageFurniture"
      semantic_label: "door"
      total_samples: 50
  random_seed: 42

repair:
  margin: 0.05
  proximity_threshold: 0.1
  methods:
    - "center_fan"
    - "planar_removed_part_aware"
    - "mlp_patch_rpa"
    - "planar_largest_hole_only"

mlp_patch:
  hidden_sizes: [64, 32, 16]
  random_state: 42

experiment:
  name: "multi_category"
  description: "Multi-category minimal-change local mesh repair experiments"
