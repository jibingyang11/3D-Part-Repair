# Multi-category experiment configuration

dataset:
  categories:
    - category: "Chair"
      semantic_label: "leg"
      total_samples: 100
    - category: "Table"
      semantic_label: "leg"
      total_samples: 50
    - category: "StorageFurniture"
      semantic_label: "door"
      total_samples: 50
  random_seed: 42

repair:
  margin: 0.05
  proximity_threshold: 0.1
  methods:
    - "center_fan"
    - "planar_removed_part_aware"
    - "planar_largest_hole_only"

experiment:
  name: "multi_category"
  description: "Multi-category minimal-change local mesh repair experiments"
